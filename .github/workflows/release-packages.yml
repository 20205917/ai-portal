name: release-packages

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  build-packages:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            package_script: package:deb
            artifact_name: aidc-deb
            artifact_path: release/*.deb
          - os: windows-latest
            package_script: package:exe
            artifact_name: aidc-exe
            artifact_path: release/*.exe
          - os: macos-latest
            package_script: package:dmg
            artifact_name: aidc-dmg
            artifact_path: release/*.dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync app version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build package
        run: npm run ${{ matrix.package_script }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 1

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: ${{ matrix.artifact_path }}

  cleanup-history:
    needs: build-packages
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Keep only latest release
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            function compareSemverTag(leftTag, rightTag) {
              const left = leftTag.replace(/^v/, "").split(".").map((item) => Number.parseInt(item, 10) || 0);
              const right = rightTag.replace(/^v/, "").split(".").map((item) => Number.parseInt(item, 10) || 0);
              const length = Math.max(left.length, right.length);
              for (let index = 0; index < length; index += 1) {
                const leftPart = left[index] ?? 0;
                const rightPart = right[index] ?? 0;
                if (leftPart > rightPart) {
                  return 1;
                }
                if (leftPart < rightPart) {
                  return -1;
                }
              }
              return 0;
            }
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });
            const versionReleases = releases
              .filter((release) => /^v\d/.test(release.tag_name))
              .sort((a, b) => compareSemverTag(b.tag_name, a.tag_name));
            if (versionReleases.length <= 1) {
              core.info("No old release to clean.");
              return;
            }
            const latest = versionReleases[0];
            core.info(`Keeping release ${latest.tag_name}`);
            for (const release of versionReleases.slice(1)) {
              core.info(`Deleting old release ${release.tag_name}`);
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.id,
              });
            }

      - name: Keep only latest workflow artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifacts = await github.paginate(github.rest.actions.listArtifactsForRepo, {
              owner,
              repo,
              per_page: 100,
            });
            const packageArtifacts = artifacts
              .filter((artifact) => ["aidc-deb", "aidc-exe", "aidc-dmg"].includes(artifact.name))
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            const keepArtifactIds = new Set();
            for (const name of ["aidc-deb", "aidc-exe", "aidc-dmg"]) {
              const latest = packageArtifacts.find((artifact) => artifact.name === name);
              if (latest) {
                keepArtifactIds.add(latest.id);
                core.info(`Keeping artifact ${name} (${latest.id})`);
              }
            }
            for (const artifact of packageArtifacts) {
              if (keepArtifactIds.has(artifact.id)) {
                continue;
              }
              core.info(`Deleting old artifact ${artifact.name} (${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id,
              });
            }
