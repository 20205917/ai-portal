appId: io.AIProtal.app
productName: AIProtal
artifactName: "${productName}-${version}-${os}-${arch}.${ext}"

directories:
  output: release

files:
  - "dist/**/*"
  - "assets/**/*"
  - "package.json"

asar: true

electronLanguages:
  - zh-CN
  - en-US

linux:
  icon: assets/icon.png
  maintainer: "zhangyj <zyj20205917@gmail>"
  target:
    - target: deb
      arch:
        - x64
  category: Utility

deb:
  executableArgs:
    - --disable-gpu
  afterInstall: scripts/deb-after-install.sh

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

mac:
  icon: assets/icon.png
  target:
    - target: dmg
      arch:
        - x64
        - arm64

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
